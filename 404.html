<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Raj Bandi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { saffron: { 400: '#ff9933' } },
          fontFamily: { mono: ['"JetBrains Mono"', 'monospace'], sans: ['"Inter"', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans antialiased min-h-screen flex items-center justify-center">
  <div class="text-center px-6">
    <div class="font-mono text-8xl font-bold text-saffron-400 mb-4">404</div>
    <div class="font-mono text-zinc-500 mb-2">$ cd /requested-page</div>
    <div class="font-mono text-red-400 mb-8">bash: cd: /requested-page: No such file or directory</div>
    <a href="/" class="inline-flex items-center gap-2 px-6 py-3 bg-saffron-400 text-zinc-900 font-semibold rounded-lg hover:bg-saffron-300 transition-all">
      Go Home
    </a>
  </div>
  <script>
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
  </script>
</body>
</html>
